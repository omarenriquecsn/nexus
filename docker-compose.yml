services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_password}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_db}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        DATABASE_URL: "postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_password}@db:5432/${POSTGRES_DB:-nexus_db}"
        PORT: ${PORT:-3001}
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nexus:nexus_password@db:5432/nexus_db}
      PORT: ${PORT:-3001}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    networks:
      - nexus

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL:-https://your-project.supabase.co}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-your-supabase-anon-key}
    environment:
      VITE_SUPABASE_URL: ${SUPABASE_URL:-https://your-project.supabase.co}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-your-supabase-anon-key}
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - nexus

networks:
  nexus:
    driver: bridge

